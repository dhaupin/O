<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Stegoframe</title>

  <!--
    Stegoframe — steganographic transport middleware
    ─────────────────────────────────────────────────────────────────────────
    Single-file app. No build step. React 18 + Babel run entirely in-browser.
    All crypto is client-side (Web Crypto API). Supabase is the transport bus.
    The server never sees plaintext — only encrypted carrier image data URLs.

    Load order: React → ReactDOM → Babel → Supabase, all before the
    <script type="text/babel"> block executes.
  -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: #08090c; color: #b8c4d0; font-family: 'DM Mono','Fira Code','Courier New',monospace; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2c3240; border-radius: 2px; }
    textarea, input, button { font-family: inherit; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin   { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ══════════════════════════════════════════════════════════════════════════════
// SUPABASE CLIENT
// ──────────────────────────────────────────────────────────────────────────────
// {{SUPA_URL}} and {{SUPA_ANON}} are substituted at request time by _worker.js
// from Cloudflare Pages environment variables. Use the publishable (anon) key —
// never the secret key. The passphrase is the real secret; it never leaves the client.
// ══════════════════════════════════════════════════════════════════════════════

const SUPA_URL  = "{{SUPA_URL}}";
const SUPA_ANON = "{{SUPA_ANON}}";
const sb = supabase.createClient(SUPA_URL, SUPA_ANON);


// ══════════════════════════════════════════════════════════════════════════════
// LIMITS & CONSTANTS
// ──────────────────────────────────────────────────────────────────────────────
// Client-side enforcement. The worker and Supabase RLS are the authoritative
// backstop against abuse — these provide fast feedback and reduce wasted I/O.
// ══════════════════════════════════════════════════════════════════════════════

const ROOM_TTL_MS       = 7 * 24 * 60 * 60 * 1000; // 7-day maximum room lifetime
const MAX_MSG_CHARS     = 2000;   // plaintext character cap per message
const MAX_CARRIER_BYTES = 512000; // ~500KB carrier data URL size cap
const MAX_ROOM_MESSAGES = 500;    // refuse to send when room hits this count
const SEND_THROTTLE_MS  = 1000;   // minimum gap between sends (1 msg/sec)
const SEND_DEBOUNCE_MS  = 300;    // debounce delay on send action


// ══════════════════════════════════════════════════════════════════════════════
// SESSION IDENTITY & USERNAME
// ──────────────────────────────────────────────────────────────────────────────
// SESSION_ID — random UUID per tab in sessionStorage.
//   Tab-scoped: a new tab is a new participant. Prevents sibling tabs from
//   appearing as "you" in each other's message thread.
//
// Username — stored in localStorage (survives tab close), editable in-room.
//   Falls back to "anon-XXXXXX" (last 6 hex chars of session UUID).
//   Stored as display_name in Supabase (plaintext, not sensitive).
// ══════════════════════════════════════════════════════════════════════════════

function getSessionId() {
  let id = sessionStorage.getItem("sf_sid");
  if (!id) { id = crypto.randomUUID(); sessionStorage.setItem("sf_sid", id); }
  return id;
}
const SESSION_ID = getSessionId();

function defaultUsername() {
  // Short, reproducible fallback from the session UUID tail
  return "anon-" + SESSION_ID.replace(/-/g, "").slice(-6);
}

function getUsername()     { return localStorage.getItem("sf_uname") || defaultUsername(); }
function saveUsername(raw) {
  const clean = sanitizeUsername(raw);
  if (clean) localStorage.setItem("sf_uname", clean);
  return clean || getUsername();
}

// Strip HTML-dangerous + control chars, trim, hard cap at 24 chars.
// @why  display_name is stored plaintext in Supabase — must be XSS-safe.
function sanitizeUsername(raw) {
  return (raw || "")
    .replace(/[<>"'`\\]/g, "")
    .replace(/[\x00-\x1f]/g, "")
    .trim()
    .slice(0, 24);
}


// ══════════════════════════════════════════════════════════════════════════════
// INPUT SANITIZATION & VALIDATION
// ──────────────────────────────────────────────────────────────────────────────
// All user-supplied strings are validated before use or network transmission.
// Message content is encrypted before storage, but display_name and room_id
// are plaintext — those paths are where injection matters.
// ══════════════════════════════════════════════════════════════════════════════

// @returns  { ok, value, err }
function sanitizeMessage(raw) {
  if (!raw || typeof raw !== "string") return { ok: false, err: "empty message" };
  const v = raw.trim();
  if (!v) return { ok: false, err: "empty message" };
  if (v.length > MAX_MSG_CHARS)
    return { ok: false, err: `max ${MAX_MSG_CHARS} chars` };
  return { ok: true, value: v, err: null };
}

// @returns  { ok, err }
function validateCarrier(url) {
  if (!url || typeof url !== "string")   return { ok: false, err: "no carrier" };
  if (!url.startsWith("data:image/"))    return { ok: false, err: "invalid carrier format" };
  if (url.length > MAX_CARRIER_BYTES)    return { ok: false, err: "carrier too large" };
  return { ok: true, err: null };
}

// Room ID must be lowercase alphanumeric, 4–16 chars.
function validateRoomId(id) { return /^[a-z0-9]{4,16}$/.test(id); }


// ══════════════════════════════════════════════════════════════════════════════
// URL / ROOM HELPERS
// ──────────────────────────────────────────────────────────────────────────────
// Query params: ?r=ROOM_ID&m=MODE
//   r — room ID  (short for "room")
//   m — encoding mode  (short for "mode")
//
// Passphrase is NEVER in the URL.
// @why  replaceState not pushState — URL is a share target, not a nav history.
// ══════════════════════════════════════════════════════════════════════════════

function getUrlParams() {
  const p = new URLSearchParams(window.location.search);
  return { room: p.get("r") || "", mode: p.get("m") || "svg" };
}
function setUrlParams(room, mode) {
  const u = new URL(window.location.href);
  u.searchParams.set("r", room);
  u.searchParams.set("m", mode);
  window.history.replaceState({}, "", u.toString());
}
function clearUrlParams() {
  const u = new URL(window.location.href);
  u.searchParams.delete("r");
  u.searchParams.delete("m");
  window.history.replaceState({}, "", u.toString());
}

// 6-byte crypto-random room code → 36-char alphabet (a-z, 0-9)
function makeRoomId() {
  return Array.from(crypto.getRandomValues(new Uint8Array(6)))
    .map(b => "abcdefghijklmnopqrstuvwxyz0123456789"[b % 36]).join("");
}


// ══════════════════════════════════════════════════════════════════════════════
// ROOM TTL HELPERS
// ══════════════════════════════════════════════════════════════════════════════

// Human-readable countdown from now to expiresAt (ms epoch).
function fmtCountdown(expiresAt) {
  const ms = expiresAt - Date.now();
  if (ms <= 0) return "expired";
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60), d=Math.floor(h/24);
  if (d > 0)  return `${d}d ${h%24}h`;
  if (h > 0)  return `${h}h ${m%60}m`;
  if (m > 0)  return `${m}m ${s%60}s`;
  return `${s}s`;
}

// Returns "normal" | "warning" (<1 day) | "critical" (<1 hour)
function countdownUrgency(expiresAt) {
  const ms = expiresAt - Date.now();
  if (ms < 60*60*1000)      return "critical";
  if (ms < 24*60*60*1000)   return "warning";
  return "normal";
}


// ══════════════════════════════════════════════════════════════════════════════
// SEND THROTTLE
// ──────────────────────────────────────────────────────────────────────────────
// Simple last-send timestamp check — 1 message per SEND_THROTTLE_MS.
// Client-side only. The worker + Cloudflare Rate Limiting rules are the real
// enforcement layer; this just gives instant UI feedback.
// ══════════════════════════════════════════════════════════════════════════════

let _lastSendTs = 0;
function canSendNow()  { return Date.now() - _lastSendTs >= SEND_THROTTLE_MS; }
function recordSend()  { _lastSendTs = Date.now(); }


// ══════════════════════════════════════════════════════════════════════════════
// CODEC — ENCRYPTION + CARRIER ENCODING
// ──────────────────────────────────────────────────────────────────────────────
// @flow  plaintext → AES-GCM-256 encrypt → pack frame → embed in carrier → data URL
//        data URL  → extract frame → unpack → decrypt → plaintext
//
// Modes:
//   SVG — payload in <desc data-p="..."> base64 attribute. Looks like abstract art.
//   LSB — payload in LSBs of red channel pixels of a noise PNG. Looks like static.
//
// Encryption constants:
//   _PI  PBKDF2 iterations (100,000)
//   _SB  Salt bytes (16)
//   _IB  AES-GCM IV bytes (12)
//   _MG  Magic 0x534746 ("SGF") — frame identifier
//   _VR  Version byte 0x02
// ══════════════════════════════════════════════════════════════════════════════

const _PI=100_000, _SB=16, _IB=12, _MG=0x534746, _VR=0x02;
const Enc = Object.freeze({ SVG:"svg", LSB:"lsb" });

// ── Key derivation ────────────────────────────────────────────────────────────

// @param p  passphrase string
// @param s  Uint8Array salt (16 bytes, random per message)
// @returns  CryptoKey (non-extractable — stays in browser crypto subsystem)
async function _dk(p, s) {
  const k = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(p), {name:"PBKDF2"}, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:s, iterations:_PI, hash:"SHA-256"},
    k, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]
  );
}

// @returns  Uint8Array: [salt(16)] + [iv(12)] + [ciphertext + 16-byte auth tag]
async function _ae(txt, p) {
  const s=crypto.getRandomValues(new Uint8Array(_SB));
  const iv=crypto.getRandomValues(new Uint8Array(_IB));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv}, await _dk(p,s), new TextEncoder().encode(txt));
  const o=new Uint8Array(_SB+_IB+ct.byteLength);
  o.set(s); o.set(iv,_SB); o.set(new Uint8Array(ct),_SB+_IB);
  return o;
}

// @returns  plaintext string, or null on wrong key / tampered data (silent failure)
// @why  Silent null — AES-GCM auth tag failure reveals nothing about whether
//       a payload exists. The carrier just appears empty.
async function _ad(d, p) {
  try {
    return new TextDecoder().decode(
      await crypto.subtle.decrypt({name:"AES-GCM",iv:d.slice(_SB,_SB+_IB)}, await _dk(p,d.slice(0,_SB)), d.slice(_SB+_IB))
    );
  } catch { return null; }
}

// ── Binary frame (8-byte header wraps every payload before carrier embedding) ─
// [0-2] Magic 0x53 0x47 0x46 | [3] Version | [4-7] uint32 length BE | [8+] payload

function _pk(p) {
  const b=new Uint8Array(8+p.length);
  b[0]=(_MG>>16)&0xFF; b[1]=(_MG>>8)&0xFF; b[2]=_MG&0xFF; b[3]=_VR;
  const l=p.length;
  b[4]=(l>>24)&0xFF; b[5]=(l>>16)&0xFF; b[6]=(l>>8)&0xFF; b[7]=l&0xFF;
  b.set(p,8); return b;
}
function _up(b) {
  if(b.length<8) return null;
  if(((b[0]<<16)|(b[1]<<8)|b[2])!==_MG||b[3]!==_VR) return null;
  const l=(b[4]<<24)|(b[5]<<16)|(b[6]<<8)|b[7];
  return(l>0&&l<=b.length-8)?b.slice(8,8+l):null;
}

// ── Base64 / bit helpers ──────────────────────────────────────────────────────
// @why  Manual loops because btoa/atob work on binary strings, not typed arrays.

function _ub(b){let s="";for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function _bu(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
function _b2B(bits){
  const b=new Uint8Array(Math.floor(bits.length/8));
  for(let i=0;i<b.length;i++){let v=0;for(let j=0;j<8;j++)v=(v<<1)|bits[i*8+j];b[i]=v;}
  return b;
}

// ── LSB carrier ───────────────────────────────────────────────────────────────

// Writes payload into LSB of red channel pixels of a square noise PNG.
// Alpha forced to 255 — transparency would reveal the image is synthetic.
function lsbWrite(payload) {
  const pk=_pk(payload);
  const dim=Math.max(32,Math.ceil(Math.sqrt(pk.length*8)));
  const cv=document.createElement("canvas"); cv.width=cv.height=dim;
  const cx=cv.getContext("2d"), im=cx.createImageData(dim,dim);
  crypto.getRandomValues(im.data);
  for(let i=3;i<im.data.length;i+=4) im.data[i]=255;
  for(let i=0;i<pk.length*8;i++){
    const bit=(pk[Math.floor(i/8)]>>(7-(i%8)))&1;
    im.data[i*4]=(im.data[i*4]&0xFE)|bit;
  }
  cx.putImageData(im,0,0); return cv.toDataURL("image/png");
}

// @why  No crossOrigin on Image — data URLs are same-origin. crossOrigin="anonymous"
//       causes canvas taint on Chrome/Android, silently zeroing getImageData().
async function lsbRead(url) {
  return new Promise(res=>{
    const im=new Image();
    im.onload=()=>{
      const cv=document.createElement("canvas"); cv.width=im.width; cv.height=im.height;
      const cx=cv.getContext("2d"); cx.drawImage(im,0,0);
      const d=cx.getImageData(0,0,im.width,im.height).data;
      const hb=[]; for(let i=0;i<64;i++) hb.push(d[i*4]&1);
      const hdr=_b2B(hb);
      if(!_up(hdr)){res(null);return;}
      const l=(hdr[4]<<24)|(hdr[5]<<16)|(hdr[6]<<8)|hdr[7],tb=(8+l)*8,ab=[];
      for(let i=0;i<tb;i++) ab.push(d[i*4]&1);
      res(_up(_b2B(ab)));
    };
    im.onerror=()=>res(null); im.src=url;
  });
}

// ── SVG carrier ───────────────────────────────────────────────────────────────

// Embeds payload in <desc data-p="..."> of a decorative gradient SVG.
// @why  btoa(unescape(encodeURIComponent(...))) — handles multi-byte UTF-8 safely.
function svgWrite(payload) {
  const b64=_ub(_pk(payload));
  const h=Math.floor(Math.random()*360), h2=(h+137)%360;
  const els=Array.from({length:5},(_,i)=>
    `<circle cx="${(8+Math.random()*84).toFixed(1)}" cy="${(8+Math.random()*84).toFixed(1)}" r="${(2+Math.random()*8).toFixed(1)}" fill="hsla(${(h+i*43)%360},45%,60%,0.1)"/>`
  ).join("");
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">`
    +`<desc data-f="${_VR}" data-p="${b64}"/>`
    +`<defs><radialGradient id="g" cx="42%" cy="42%" r="62%">`
    +`<stop offset="0%" stop-color="hsl(${h},50%,62%)"/>`
    +`<stop offset="100%" stop-color="hsl(${h2},42%,18%)"/>`
    +`</radialGradient></defs><rect width="100" height="100" fill="url(#g)"/>${els}</svg>`;
  return "data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(svg)));
}

function svgRead(url) {
  try {
    const raw=decodeURIComponent(escape(atob(url.split(",")[1])));
    const m=raw.match(/data-p="([A-Za-z0-9+/=]+)"/);
    return m?_up(_bu(m[1])):null;
  } catch { return null; }
}

// ── Codec public API ──────────────────────────────────────────────────────────

const Codec = {
  async encode(txt,pass,mode) {
    const e=await _ae(txt,pass);
    return mode===Enc.LSB?lsbWrite(e):svgWrite(e);
  },
  async decode(url,pass) {
    let r=svgRead(url);
    if(!r) r=await lsbRead(url); // SVG failed — try LSB
    if(!r) return null;
    return _ad(r,pass);
  },
  sniff(url) {
    if(!url) return Enc.SVG;
    try{const p=atob(url.split(",")[1]).slice(0,64);if(p.includes("<svg"))return Enc.SVG;}catch{}
    return Enc.LSB;
  },
};


// ══════════════════════════════════════════════════════════════════════════════
// SUPABASE DB TRANSPORT
// ──────────────────────────────────────────────────────────────────────────────
// Schema:
//   rooms    { id text PK, created_at timestamptz, expires_at timestamptz }
//   messages { id uuid PK, room_id text, carrier text, mode text,
//              sender_id text, display_name text, ts timestamptz }
//
//   display_name — plaintext username stored openly. Not sensitive content.
//                  The encrypted carrier is the sensitive payload.
// ══════════════════════════════════════════════════════════════════════════════

// Ensure room exists; create with 7-day TTL if not. Returns { expiresAt: ms epoch }.
// @why  upsert would silently reset expires_at on every join — we want the
//       original creation time to be authoritative, so we read-then-insert.
async function dbEnsureRoom(roomId) {
  const { data: existing } = await sb
    .from("rooms").select("expires_at").eq("id", roomId).single();
  if (existing) return { expiresAt: new Date(existing.expires_at).getTime() };

  // New room — calculate TTL from now
  const expiresAt = new Date(Date.now() + ROOM_TTL_MS).toISOString();
  const { data, error } = await sb
    .from("rooms").insert({ id: roomId, expires_at: expiresAt })
    .select("expires_at").single();
  if (error) throw error;
  return { expiresAt: new Date(data.expires_at).getTime() };
}

// Post carrier. Returns DB-assigned row id (needed for delete patching).
async function dbPost(roomId, carrier, mode, senderId, displayName) {
  const { data, error } = await sb.from("messages").insert({
    room_id: roomId, carrier, mode,
    sender_id: senderId,
    display_name: sanitizeUsername(displayName),
  }).select("id").single();
  if (error) throw error;
  return data.id;
}

// Load 200 most recent messages, oldest first.
async function dbLoad(roomId) {
  const { data, error } = await sb
    .from("messages").select("*")
    .eq("room_id", roomId)
    .order("ts", { ascending: true })
    .limit(200);
  if (error) throw error;
  return data ?? [];
}

async function dbDelete(id) {
  const { error } = await sb.from("messages").delete().eq("id", id);
  if (error) throw error;
}

// Wipe all messages AND the room row. Called on leave or TTL expiry.
async function dbDeleteRoom(roomId) {
  await sb.from("messages").delete().eq("room_id", roomId);
  await sb.from("rooms").delete().eq("id", roomId);
}

// Subscribe to INSERT + DELETE realtime events for a room.
// @returns  unsubscribe fn
// @why  `replica identity full` must be set on messages table for DELETE
//       events to carry the old row id. See README for SQL setup.
function dbSubscribe(roomId, onInsert, onDelete) {
  const ch = sb.channel(`room:${roomId}`)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:`room_id=eq.${roomId}`},
      p=>onInsert(p.new))
    .on("postgres_changes",{event:"DELETE",schema:"public",table:"messages",filter:`room_id=eq.${roomId}`},
      p=>{ const id=p.old?.id; if(id) onDelete(id); })
    .subscribe();
  return ()=>sb.removeChannel(ch);
}


// ══════════════════════════════════════════════════════════════════════════════
// DESIGN TOKENS
// ══════════════════════════════════════════════════════════════════════════════

const T={
  bg:"#08090c",surf:"#0e1116",raised:"#13161c",
  b0:"#1e2229",b1:"#2c3240",b2:"#3e4656",
  dim:"#4a5568",muted:"#6b7a8d",sub:"#8899aa",txt:"#b8c4d0",bright:"#dce6f0",white:"#f0f5fa",
  green:"#1dff8f",gd:"#071a0f",
  red:"#ff3d5a",rd:"#1a0508",
  amber:"#ffb840",ad:"#1a1000",
  blue:"#4db8ff",bd:"#001422",
  out:"#0d1f2d",outB:"#1a3a52",
  inc:"#0f1318",incB:"#1e2229",
};
const MONO="'DM Mono','Fira Code','Courier New',monospace";
const DISP="'Syne',sans-serif";


// ══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════════════

// Wraps bare base64 in the correct data URL MIME prefix by peeking at bytes.
function wrapB64(s){
  try{const p=atob(s).slice(0,64);if(p.includes("<svg")||p.includes("<?xml"))return"data:image/svg+xml;base64,"+s;}catch{}
  return"data:image/png;base64,"+s;
}

// Accepts data URL or bare base64 string. Returns data URL or null.
function toDataUrl(s){
  s=s.trim();
  if(s.startsWith("data:"))return s;
  try{atob(s);return wrapB64(s);}catch{}
  return null;
}

function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}

// Returns a function that delays invoking fn until after wait ms of silence.
function debounce(fn,wait){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),wait);};}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: CountdownBadge
// ──────────────────────────────────────────────────────────────────────────────
// Live countdown to room expiry, updating every second.
// Colour: normal (dim) → warning (amber, <1 day) → critical (red, <1 hour).
//
// @prop expiresAt  number — ms epoch
// ══════════════════════════════════════════════════════════════════════════════

function CountdownBadge({ expiresAt }) {
  const [label,   setLabel]   = useState(fmtCountdown(expiresAt));
  const [urgency, setUrgency] = useState(countdownUrgency(expiresAt));

  useEffect(()=>{
    const tick=()=>{ setLabel(fmtCountdown(expiresAt)); setUrgency(countdownUrgency(expiresAt)); };
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[expiresAt]);

  const color=urgency==="critical"?T.red:urgency==="warning"?T.amber:T.dim;
  return(
    <span title={`Expires ${new Date(expiresAt).toLocaleString()}`}
      style={{fontSize:8,color,letterSpacing:"0.1em",flexShrink:0,fontFamily:MONO}}>
      ⏱{label}
    </span>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: ProfileWidget
// ──────────────────────────────────────────────────────────────────────────────
// Inline popover for editing the display name. Opens from the ✎ header button.
// Saves to localStorage on confirm. New name appears on next sent message.
//
// @prop onClose  fn()
// ══════════════════════════════════════════════════════════════════════════════

function ProfileWidget({ onClose }) {
  const [val,   setVal]   = useState(getUsername());
  const [saved, setSaved] = useState(false);

  const save=()=>{
    const clean=saveUsername(val);
    setVal(clean); setSaved(true);
    setTimeout(()=>{ setSaved(false); onClose(); },800);
  };

  return(
    <div style={{
      position:"absolute",top:48,right:12,zIndex:100,
      background:T.surf,border:`1px solid ${T.b1}`,borderRadius:4,
      padding:14,width:220,animation:"fadeUp 0.15s ease",boxShadow:"0 8px 24px rgba(0,0,0,0.5)",
    }}>
      <div style={{fontSize:8,color:T.muted,letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:8}}>display name</div>
      <div style={{display:"flex",gap:6}}>
        <input value={val} onChange={e=>setVal(e.target.value.slice(0,24))} maxLength={24}
          onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")onClose();}}
          autoFocus
          style={{flex:1,background:T.raised,border:`1px solid ${T.b1}`,color:T.bright,padding:"6px 8px",fontSize:11,outline:"none",borderRadius:2}}
        />
        <button onClick={save} style={{background:T.gd,border:`1px solid ${T.green}`,color:T.green,padding:"6px 10px",fontSize:9,cursor:"pointer",borderRadius:2,letterSpacing:"0.1em"}}>
          {saved?"✓":"save"}
        </button>
      </div>
      <div style={{fontSize:8,color:T.dim,marginTop:6,lineHeight:1.6}}>Max 24 chars · stored locally · shown beside messages.</div>
    </div>

// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: CarrierThumb
// ──────────────────────────────────────────────────────────────────────────────
// Thumbnail + expandable inspector for a carrier image.
//
// @prop carrier  string — data URL
// @prop mode     string — Enc.SVG | Enc.LSB
// ══════════════════════════════════════════════════════════════════════════════

function CarrierThumb({ carrier, mode }) {
  const [open,setOpen]     = useState(false);
  const [copied,setCopied] = useState(false);
  const isSvg=mode===Enc.SVG||carrier?.startsWith("data:image/svg");
  if(!carrier) return null;
  const copy=()=>navigator.clipboard?.writeText(carrier).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});
  const dl=()=>{const a=document.createElement("a");a.href=carrier;a.download=`carrier.${isSvg?"svg":"png"}`;a.click();};
  return(
    <>
      <div onClick={()=>setOpen(v=>!v)}
        style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:6,cursor:"pointer",opacity:0.65,transition:"opacity 0.15s"}}
        onMouseEnter={e=>e.currentTarget.style.opacity=1}
        onMouseLeave={e=>e.currentTarget.style.opacity=0.65}>
        <div style={{width:26,height:26,borderRadius:2,overflow:"hidden",border:`1px solid ${T.b1}`,flexShrink:0,background:T.raised}}>
          <img src={carrier} style={{width:"100%",height:"100%",imageRendering:isSvg?"auto":"pixelated",display:"block"}} alt=""/>
        </div>
        <span style={{fontSize:8,color:T.muted,letterSpacing:"0.15em"}}>{isSvg?"SVG":"LSB"} carrier {open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:6,background:T.raised,border:`1px solid ${T.b1}`,borderRadius:3,padding:10,animation:"fadeUp 0.15s ease"}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:56,height:56,borderRadius:2,overflow:"hidden",border:`1px solid ${T.b1}`,flexShrink:0}}>
              <img src={carrier} style={{width:"100%",height:"100%",imageRendering:isSvg?"auto":"pixelated",display:"block"}} alt=""/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:8,color:T.dim,wordBreak:"break-all",lineHeight:1.5,maxHeight:32,overflow:"hidden"}}>
                {carrier.split(",")[1]?.slice(0,56)}…
              </div>
              <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                <Btn small ghost onClick={copy}>{copied?"copied ✓":"copy url"}</Btn>
                <Btn small ghost onClick={dl}>↓ save</Btn>
                <Btn small ghost onClick={()=>setOpen(false)}>✕</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: Btn — reusable button primitive
// @prop ghost / danger / small / disabled
// ══════════════════════════════════════════════════════════════════════════════

function Btn({children,onClick,disabled,ghost,danger,small,style={}}){
  const bg=danger?T.rd:ghost?"transparent":T.raised;
  const bdr=danger?T.red:T.b1;
  const col=danger?T.red:ghost?T.sub:T.txt;
  return(
    <button onClick={onClick} disabled={disabled} style={{
      background:disabled?T.surf:bg,border:`1px solid ${disabled?T.b0:bdr}`,
      color:disabled?T.dim:col,padding:small?"3px 8px":"8px 14px",
      fontSize:small?8:9,letterSpacing:"0.18em",cursor:disabled?"not-allowed":"pointer",
      borderRadius:2,transition:"all 0.15s",textTransform:"uppercase",whiteSpace:"nowrap",...style,
    }}>{children}</button>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: Bubble
// ──────────────────────────────────────────────────────────────────────────────
// Single message bubble. Shows display_name in the metadata line.
// Delete is own-messages-only, two-step (hover reveal → confirm).
//
// @prop msg        — local message object (see decodeRow)
// @prop isMine     — sender_id === SESSION_ID
// @prop onDelete   — fn(dbId)
// ══════════════════════════════════════════════════════════════════════════════

function Bubble({ msg, isMine, onDelete }) {
  const [confirmDel,setConfirmDel] = useState(false);
  const failed=msg.status==="failed";
  const bg    =isMine?T.out:T.inc;
  const border=isMine?T.outB:T.incB;
  const align =isMine?"flex-end":"flex-start";
  // "you" for own messages, sender's display_name or "anon" for others
  const nameLabel=isMine?"you":(msg.displayName||"anon");

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:align,marginBottom:14,animation:"fadeUp 0.2s ease",position:"relative"}}
      onMouseEnter={e=>{if(isMine)e.currentTarget.querySelector(".del-btn")?.style&&(e.currentTarget.querySelector(".del-btn").style.opacity=1);}}
      onMouseLeave={e=>{if(isMine)e.currentTarget.querySelector(".del-btn")?.style&&(e.currentTarget.querySelector(".del-btn").style.opacity=0);}}>

      {/* Delete trigger — own messages only, hidden until hover */}
      {isMine&&!confirmDel&&(
        <button className="del-btn" onClick={()=>setConfirmDel(true)} style={{
          position:"absolute",top:-6,right:-6,width:18,height:18,
          borderRadius:"50%",background:T.rd,border:`1px solid ${T.red}`,
          color:T.red,fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
          opacity:0,transition:"opacity 0.15s",zIndex:2,lineHeight:1,
        }}>✕</button>
      )}
      {isMine&&confirmDel&&(
        <div style={{display:"flex",gap:4,marginBottom:4,animation:"fadeUp 0.1s ease"}}>
          <Btn small danger onClick={()=>{onDelete(msg.dbId);setConfirmDel(false);}}>delete</Btn>
          <Btn small ghost  onClick={()=>setConfirmDel(false)}>cancel</Btn>
        </div>
      )}

      <div style={{maxWidth:"78%",minWidth:80,background:bg,border:`1px solid ${border}`,
        borderRadius:isMine?"10px 10px 2px 10px":"10px 10px 10px 2px",padding:"10px 13px"}}>
        {failed
          ?<div style={{fontSize:11,color:T.red,lineHeight:1.6}}>{msg.err}</div>
          :<>
            <div style={{fontSize:13,color:T.bright,lineHeight:1.7,wordBreak:"break-word",whiteSpace:"pre-wrap"}}>
              {typeof msg.value==="object"?JSON.stringify(msg.value,null,2):msg.value}
            </div>
            <CarrierThumb carrier={msg.carrier} mode={msg.mode}/>
          </>
        }
      </div>

      {/* Metadata: time · name (colour-coded) · mode */}
      <div style={{fontSize:8,color:T.dim,marginTop:3,letterSpacing:"0.1em",paddingLeft:isMine?0:4,paddingRight:isMine?4:0}}>
        {fmtTime(msg.ts)} · <span style={{color:isMine?T.green:T.sub}}>{nameLabel}</span> · {(msg.mode||"?").toUpperCase()}
        {failed&&" · failed"}
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: ChatView
// ──────────────────────────────────────────────────────────────────────────────
// Owns the full message lifecycle for an active room:
//   - Load history on mount / manual reload
//   - Realtime INSERT + DELETE subscription
//   - Encode + send (with throttle, debounce, size cap)
//   - Decode + display inbound messages
//   - Carrier input: file picker, paste bar, drag-drop, global paste
//   - Room TTL countdown + auto-expiry
//   - Profile (display name) widget
//   - Leave + room wipe
//
// @prop roomId      string
// @prop mode        Enc.SVG | Enc.LSB
// @prop passphrase  string (never leaves client memory)
// @prop expiresAt   number (ms epoch) — from Supabase rooms table
// @prop onLeave     fn()
// ══════════════════════════════════════════════════════════════════════════════

function ChatView({ roomId, mode, passphrase, expiresAt, onLeave }) {
  const [msgs,       setMsgs]      = useState([]);
  const [text,       setText]      = useState("");
  const [busy,       setBusy]      = useState(false);
  const [loading,    setLoading]   = useState(true);
  const [error,      setError]     = useState(null);
  const [dragOver,   setDrag]      = useState(false);
  const [pasteMode,  setPaste]     = useState(false);
  const [pasteVal,   setPasteVal]  = useState("");
  const [connState,  setConn]      = useState("connecting");
  const [showProfile,setShowProfile] = useState(false);
  const [throttleMsg,setThrottleMsg] = useState(null);
  const [msgCount,   setMsgCount]  = useState(0);

  const bottomRef    = useRef();
  const textareaRef  = useRef();
  const fileRef      = useRef();
  const lastVisibleRef = useRef(Date.now());

  // ── TTL expiry check ─────────────────────────────────────────────────────────
  // Check every minute. If room has expired, wipe and return to Setup.
  useEffect(()=>{
    const check=()=>{
      if(Date.now()>=expiresAt){ dbDeleteRoom(roomId).catch(()=>{}); onLeave(); }
    };
    check();
    const id=setInterval(check,60_000);
    return()=>clearInterval(id);
  },[expiresAt]);

  // ── Load history ─────────────────────────────────────────────────────────────
  const reload=useCallback(()=>{
    setLoading(true);setError(null);
    dbLoad(roomId)
      .then(async rows=>{
        setMsgCount(rows.length);
        const decoded=await Promise.all(rows.map(r=>decodeRow(r,passphrase,mode)));
        setMsgs(decoded.filter(Boolean));setLoading(false);
      })
      .catch(e=>{setError("Failed to load: "+e.message);setLoading(false);});
  },[roomId,passphrase,mode]);

  useEffect(()=>{
    setLoading(true);setError(null);
    dbLoad(roomId)
      .then(async rows=>{
        setMsgCount(rows.length);
        const decoded=await Promise.all(rows.map(r=>decodeRow(r,passphrase,mode)));
        setMsgs(decoded.filter(Boolean));setLoading(false);
      })
      .catch(e=>{setError("Failed to load messages: "+e.message);setLoading(false);});
  },[roomId,passphrase]);

  // ── Realtime subscription ────────────────────────────────────────────────────
  useEffect(()=>{
    setConn("connecting");
    const unsub=dbSubscribe(roomId,
      async row=>{
        if(row.sender_id===SESSION_ID)return; // skip own (already optimistic)
        const m=await decodeRow(row,passphrase,mode);
        if(m){setMsgs(prev=>[...prev,m]);setMsgCount(c=>c+1);}
        setConn("live");
      },
      id=>{setMsgs(prev=>prev.filter(m=>m.dbId!==id));setMsgCount(c=>Math.max(0,c-1));}
    );
    const t=setTimeout(()=>setConn("live"),2000);
    return()=>{unsub();clearTimeout(t);};
  },[roomId,passphrase]);

  // ── Auto-scroll ──────────────────────────────────────────────────────────────
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  // ── Tab-switch guard ─────────────────────────────────────────────────────────
  useEffect(()=>{
    const handler=()=>{
      if(document.visibilityState==="visible"){
        lastVisibleRef.current=Date.now();
        if(document.activeElement===textareaRef.current) textareaRef.current.blur();
      }
    };
    document.addEventListener("visibilitychange",handler);
    return()=>document.removeEventListener("visibilitychange",handler);
  },[]);

  // ── Global paste ─────────────────────────────────────────────────────────────
  const handlePaste=useCallback(e=>{
    if(document.activeElement===textareaRef.current)return;
    if(Date.now()-lastVisibleRef.current<800)return;
    const items=Array.from(e.clipboardData?.items??[]);
    const img=items.find(i=>i.type.startsWith("image/"));
    if(img){receiveFile(img.getAsFile());return;}
    const txt=items.find(i=>i.kind==="string");
    if(txt)txt.getAsString(s=>{const u=toDataUrl(s);if(u)receiveCarrier(u);});
  },[passphrase,mode]);

  useEffect(()=>{
    document.addEventListener("paste",handlePaste);
    return()=>document.removeEventListener("paste",handlePaste);
  },[handlePaste]);

  // ── Close profile on outside click ──────────────────────────────────────────
  useEffect(()=>{
    if(!showProfile)return;
    const handler=e=>{
      if(!e.target.closest(".profile-widget")&&!e.target.closest(".profile-btn"))
        setShowProfile(false);
    };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[showProfile]);

  // ── decodeRow ────────────────────────────────────────────────────────────────
  // Converts a raw Supabase row into a local message object.
  // Decryption happens entirely here — passphrase never touches the network.
  async function decodeRow(row,pass,expectedMode){
    const raw=await Codec.decode(row.carrier,pass);
    const isMine=row.sender_id===SESSION_ID;
    return{
      dbId:row.id, localId:`local_${row.id}`,
      dir:isMine?"out":"in",
      status:raw?"decoded":"failed",
      mode:row.mode||expectedMode,
      carrier:row.carrier,
      value:raw,
      displayName:row.display_name||null,
      err:raw?null:"decryption failed — wrong key or different mode",
      ts:new Date(row.ts).getTime(),
      senderId:row.sender_id,
    };
  }

  // ── send ─────────────────────────────────────────────────────────────────────
  // @flow
  //   1. Sanitize + validate plaintext (length, chars)
  //   2. Throttle check (1 msg/sec), room cap check (500 msgs)
  //   3. Encode into carrier (local crypto — no network)
  //   4. Validate carrier size
  //   5. Optimistic local insert (instant UI)
  //   6. POST to Supabase → patch optimistic with real DB id
  const send=async()=>{
    const sanity=sanitizeMessage(text);
    if(!sanity.ok||busy)return;
    if(Date.now()-lastVisibleRef.current<800)return;

    if(!canSendNow()){
      setThrottleMsg("slow down — 1 message per second");
      setTimeout(()=>setThrottleMsg(null),1500);
      return;
    }
    if(msgCount>=MAX_ROOM_MESSAGES){
      setThrottleMsg(`room is full (max ${MAX_ROOM_MESSAGES} messages)`);
      setTimeout(()=>setThrottleMsg(null),3000);
      return;
    }

    setBusy(true);setText("");recordSend();
    try{
      const carrier=await Codec.encode(sanity.value,passphrase,mode);
      const cv=validateCarrier(carrier);
      if(!cv.ok) throw new Error(cv.err);

      const username=getUsername();
      const optimistic={
        dbId:null,localId:`opt_${Date.now()}`,
        dir:"out",status:"encoded",mode,carrier,
        value:sanity.value,displayName:username,
        err:null,ts:Date.now(),senderId:SESSION_ID,
      };
      setMsgs(prev=>[...prev,optimistic]);
      setMsgCount(c=>c+1);
      const dbId=await dbPost(roomId,carrier,mode,SESSION_ID,username);
      setMsgs(prev=>prev.map(m=>m.localId===optimistic.localId?{...m,dbId}:m));
    }catch(e){
      setMsgs(prev=>[...prev,{
        dbId:null,localId:`err_${Date.now()}`,dir:"out",status:"failed",
        mode,carrier:null,value:null,displayName:null,
        err:"send failed: "+e.message,ts:Date.now(),senderId:SESSION_ID,
      }]);
    }finally{setBusy(false);}
  };

  // Debounced send — prevents double-fire on rapid Enter key presses
  const debouncedSend=useCallback(debounce(send,SEND_DEBOUNCE_MS),[text,busy,passphrase,mode,msgCount]);

  // ── receiveCarrier (local decode — paste / drop / file, no DB) ───────────────
  const receiveCarrier=async(url)=>{
    if(!url)return;
    const cv=validateCarrier(url);
    if(!cv.ok){console.warn("carrier rejected:",cv.err);return;}
    setBusy(true);
    try{
      const raw=await Codec.decode(url,passphrase);
      setMsgs(prev=>[...prev,{
        dbId:null,localId:`recv_${Date.now()}`,dir:"in",
        status:raw?"decoded":"failed",mode:Codec.sniff(url),
        carrier:url,value:raw,displayName:null,
        err:raw?null:"decryption failed — wrong key or no payload",
        ts:Date.now(),senderId:"external",
      }]);
    }finally{setBusy(false);}
  };

  const receiveFile=(file)=>{const r=new FileReader();r.onload=e=>receiveCarrier(e.target.result);r.readAsDataURL(file);};

  // ── deleteMsg ────────────────────────────────────────────────────────────────
  const deleteMsg=async(dbId)=>{
    if(!dbId)return;
    try{
      await dbDelete(dbId);
      setMsgs(prev=>prev.filter(m=>m.dbId!==dbId));
      setMsgCount(c=>Math.max(0,c-1));
    }catch(e){console.error("delete failed",e);}
  };

  const shareUrl=()=>{
    navigator.clipboard?.writeText(window.location.href)
      .then(()=>alert("Room URL copied!\n\nShare it — the other party will be prompted for the passphrase."));
  };

  // ── Leave / room wipe ────────────────────────────────────────────────────────
  const [leaveConfirm,setLeaveConfirm]=useState(false);
  const confirmLeave=async()=>{
    try{await dbDeleteRoom(roomId);}catch(e){console.error("wipe failed",e);}
    setLeaveConfirm(false);onLeave();
  };

  const connColor={connecting:T.amber,live:T.green,error:T.red}[connState]??T.dim;
  const atCap=msgCount>=MAX_ROOM_MESSAGES;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,position:"relative"}}>

      {/* ── Header ── */}
      <div style={{background:T.raised,borderBottom:`1px solid ${T.b0}`,padding:"8px 12px",display:"flex",alignItems:"center",gap:8,flexShrink:0,minWidth:0}}>
        <div style={{fontFamily:DISP,fontSize:14,fontWeight:800,color:T.white,letterSpacing:"0.05em",flexShrink:0}}>
          SF<span style={{color:T.green}}>·</span>
        </div>
        {/* Room code truncates on narrow screens */}
        <span style={{fontSize:9,color:T.muted,letterSpacing:"0.15em",fontFamily:MONO,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>
          #{roomId}
        </span>
        <span style={{fontSize:8,color:T.dim,letterSpacing:"0.15em",flexShrink:0}}>{mode.toUpperCase()}</span>
        {/* Connection dot: amber=connecting, green=live, red=error */}
        <span title={connState} style={{width:5,height:5,borderRadius:"50%",background:connColor,display:"inline-block",flexShrink:0,animation:connState==="connecting"?"pulse 1s infinite":"none"}}/>
        {/* TTL countdown — colour shifts as expiry approaches */}
        <CountdownBadge expiresAt={expiresAt}/>
        <div style={{marginLeft:"auto",display:"flex",gap:6,flexShrink:0}}>
          {/* ↻ Reload */}
          <button onClick={reload} title="reload messages" style={{background:"transparent",border:`1px solid ${T.b1}`,color:T.sub,width:30,height:30,cursor:"pointer",borderRadius:2,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",animation:loading?"spin 0.8s linear infinite":"none"}}>↻</button>
          {/* ✎ Profile widget toggle */}
          <button className="profile-btn" onClick={()=>setShowProfile(v=>!v)} title="set display name" style={{background:showProfile?T.gd:"transparent",border:`1px solid ${showProfile?T.green:T.b1}`,color:showProfile?T.green:T.sub,width:30,height:30,cursor:"pointer",borderRadius:2,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✎</button>
          {/* ⎗ Share URL */}
          <button onClick={shareUrl} title="copy room url" style={{background:"transparent",border:`1px solid ${T.b1}`,color:T.sub,width:30,height:30,cursor:"pointer",borderRadius:2,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>⎗</button>
          {/* ⏻ Leave + wipe */}
          <button onClick={()=>setLeaveConfirm(true)} title="leave room" style={{background:T.rd,border:`1px solid ${T.red}`,color:T.red,width:30,height:30,cursor:"pointer",borderRadius:2,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>⏻</button>
        </div>
      </div>

      {/* Profile widget — absolute overlay below header */}
      {showProfile&&(
        <div className="profile-widget" style={{position:"absolute",top:0,left:0,right:0,zIndex:99}}>
          <ProfileWidget onClose={()=>setShowProfile(false)}/>
        </div>
      )}

      {/* ── Message thread ── */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 4px",display:"flex",flexDirection:"column"}}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)receiveFile(f);else{const u=toDataUrl(e.dataTransfer.getData("text"));if(u)receiveCarrier(u);}}}>

        {/* Full-screen drop overlay */}
        {dragOver&&(
          <div style={{position:"fixed",inset:0,background:"rgba(29,255,143,0.04)",border:`2px dashed ${T.green}`,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <span style={{fontSize:11,color:T.green,letterSpacing:"0.3em"}}>DROP CARRIER</span>
          </div>
        )}

        {loading&&(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:16,height:16,border:`2px solid ${T.b1}`,borderTopColor:T.green,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          </div>
        )}
        {!loading&&error&&<div style={{padding:16,color:T.red,fontSize:10,letterSpacing:"0.1em",lineHeight:1.6}}>{error}</div>}
        {!loading&&!error&&msgs.length===0&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,opacity:0.3}}>
            <div style={{fontSize:10,letterSpacing:"0.3em",color:T.muted}}>NO TRANSMISSIONS</div>
            <div style={{fontSize:8,letterSpacing:"0.2em",color:T.dim}}>type a message to begin</div>
          </div>
        )}

        {/* Room-at-capacity warning */}
        {atCap&&!loading&&(
          <div style={{padding:"8px 12px",background:T.ad,border:`1px solid ${T.amber}`,borderRadius:2,marginBottom:10,fontSize:9,color:T.amber,letterSpacing:"0.1em"}}>
            room is at capacity ({MAX_ROOM_MESSAGES} messages) — delete messages to send more
          </div>
        )}

        {/* localId used as key — stable even before dbId is assigned */}
        {!loading&&msgs.map(m=>(
          <Bubble key={m.localId||m.dbId} msg={m} isMine={m.senderId===SESSION_ID} onDelete={deleteMsg}/>
        ))}
        <div ref={bottomRef}/>
      </div>

      {/* ── Paste carrier bar (toggleable) ── */}
      {pasteMode&&(
        <div style={{padding:"8px 12px",background:T.surf,borderTop:`1px solid ${T.b0}`,flexShrink:0,animation:"fadeUp 0.15s ease"}}>
          <div style={{fontSize:8,color:T.muted,letterSpacing:"0.2em",marginBottom:6,textTransform:"uppercase"}}>paste carrier · data url or base64</div>
          <div style={{display:"flex",gap:6}}>
            <input value={pasteVal} onChange={e=>setPasteVal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){const u=toDataUrl(pasteVal.trim());if(u){receiveCarrier(u);setPasteVal("");setPaste(false);}}if(e.key==="Escape"){setPaste(false);setPasteVal("");}}}
              placeholder="data:image/... or bare base64" autoFocus
              style={{flex:1,background:T.raised,border:`1px solid ${T.b1}`,color:T.bright,padding:"8px 10px",fontSize:11,outline:"none",borderRadius:2}}
            />
            <Btn onClick={()=>{const u=toDataUrl(pasteVal.trim());if(u){receiveCarrier(u);setPasteVal("");setPaste(false);}}}>→</Btn>
            <Btn ghost onClick={()=>{setPaste(false);setPasteVal("");}}>✕</Btn>
          </div>
        </div>
      )}

      {/* Throttle / cap notice bar */}
      {throttleMsg&&(
        <div style={{padding:"6px 12px",background:T.ad,borderTop:`1px solid ${T.amber}`,fontSize:9,color:T.amber,letterSpacing:"0.1em",flexShrink:0}}>
          {throttleMsg}
        </div>
      )}

      {/* Char counter — appears at 80% of limit */}
      {text.length>MAX_MSG_CHARS*0.8&&(
        <div style={{padding:"3px 12px",background:T.surf,fontSize:8,color:text.length>=MAX_MSG_CHARS?T.red:T.amber,letterSpacing:"0.1em",flexShrink:0,textAlign:"right"}}>
          {text.length}/{MAX_MSG_CHARS}
        </div>
      )}

      {/* ── Compose bar ── */}
      <div style={{background:T.raised,borderTop:`1px solid ${T.b0}`,padding:"10px 12px",flexShrink:0,display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
          {/* ⊕ File picker */}
          <button onClick={()=>fileRef.current?.click()} title="upload carrier file" style={{background:"transparent",border:`1px solid ${T.b1}`,color:T.muted,width:34,height:34,cursor:"pointer",borderRadius:2,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>⊕</button>
          {/* ⌗ Paste bar toggle */}
          <button onClick={()=>setPaste(v=>!v)} title="paste carrier base64" style={{background:pasteMode?T.gd:"transparent",border:`1px solid ${pasteMode?T.green:T.b1}`,color:pasteMode?T.green:T.muted,width:34,height:34,cursor:"pointer",borderRadius:2,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>⌗</button>
        </div>
        <input ref={fileRef} type="file" accept="image/*,.svg" style={{display:"none"}}
          onChange={e=>{if(e.target.files[0])receiveFile(e.target.files[0]);e.target.value="";}}/>
        {/* Auto-resizing textarea, hard-capped at MAX_MSG_CHARS */}
        <textarea ref={textareaRef} value={text}
          onChange={e=>{if(e.target.value.length<=MAX_MSG_CHARS)setText(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();debouncedSend();}}}
          placeholder="type a message…" rows={1} disabled={busy||atCap}
          style={{flex:1,background:T.surf,border:`1px solid ${T.b0}`,color:T.bright,padding:"9px 12px",fontSize:13,outline:"none",borderRadius:6,lineHeight:1.6,resize:"none",minHeight:38,maxHeight:120,overflow:"auto"}}
        />
        <button onClick={debouncedSend} disabled={!text.trim()||busy||atCap} style={{
          background:(!text.trim()||busy||atCap)?T.surf:T.gd,
          border:`1px solid ${(!text.trim()||busy||atCap)?T.b1:T.green}`,
          color:(!text.trim()||busy||atCap)?T.dim:T.green,
          width:38,height:38,borderRadius:2,fontSize:16,flexShrink:0,
          cursor:(!text.trim()||busy||atCap)?"not-allowed":"pointer",
          transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center",
        }}>{busy?"…":"↑"}</button>
      </div>

      {/* ── Leave confirmation modal ── */}
      {leaveConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:T.surf,border:`1px solid ${T.red}`,borderRadius:4,padding:24,maxWidth:340,width:"100%",animation:"fadeUp 0.2s ease"}}>
            <div style={{fontSize:11,color:T.red,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:10}}>leave room?</div>
            <div style={{fontSize:12,color:T.txt,lineHeight:1.8,marginBottom:20}}>
              This will <strong style={{color:T.bright}}>permanently delete all messages</strong> in room{" "}
              <strong style={{color:T.bright}}>#{roomId}</strong> for all participants. Cannot be undone.
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={confirmLeave} style={{flex:1,padding:"10px",background:T.rd,border:`1px solid ${T.red}`,color:T.red,fontSize:9,letterSpacing:"0.2em",cursor:"pointer",borderRadius:2,textTransform:"uppercase"}}>delete all + leave</button>
              <button onClick={()=>setLeaveConfirm(false)} style={{flex:1,padding:"10px",background:"transparent",border:`1px solid ${T.b1}`,color:T.sub,fontSize:9,letterSpacing:"0.2em",cursor:"pointer",borderRadius:2,textTransform:"uppercase"}}>cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: Setup
// ──────────────────────────────────────────────────────────────────────────────
// Create or join a room. Join flow detected by ?r= in URL.
// On join screen: fetches existing room expiry to show countdown.
// Username field pre-filled from localStorage.
//
// @prop onJoin  fn({ roomId, mode, passphrase, expiresAt })
// ══════════════════════════════════════════════════════════════════════════════

function Setup({ onJoin }) {
  const urlParams=getUrlParams();
  const isJoining=!!urlParams.room;

  const [pass,       setPass]      = useState("");
  const [mode,       setMode]      = useState(urlParams.mode||"svg");
  const [err,        setErr]       = useState("");
  const [show,       setShow]      = useState(false);
  const [loading,    setLoading]   = useState(false);
  const [roomExpiry, setRoomExpiry]= useState(null); // prefetched for join screen
  const [uname,      setUname]     = useState(getUsername());
  const [roomId]                   = useState(isJoining?urlParams.room:makeRoomId());

  // Prefetch room expiry for the join screen countdown
  useEffect(()=>{
    if(!isJoining)return;
    sb.from("rooms").select("expires_at").eq("id",roomId).single()
      .then(({data})=>{ if(data) setRoomExpiry(new Date(data.expires_at).getTime()); });
  },[]);

  const join=async()=>{
    if(!pass.trim())            {setErr("passphrase required");   return;}
    if(pass.trim().length<4)    {setErr("at least 4 characters"); return;}
    if(!validateRoomId(roomId)) {setErr("invalid room id");       return;}
    saveUsername(uname);
    setLoading(true); setErr("");
    try{
      const {expiresAt}=await dbEnsureRoom(roomId);
      setUrlParams(roomId,mode);
      onJoin({roomId,mode,passphrase:pass.trim(),expiresAt});
    }catch(e){
      setErr("could not open room: "+e.message);
      setLoading(false);
    }
  };

  return(
    <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg,padding:20,overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:380}}>

        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontFamily:DISP,fontSize:30,fontWeight:800,color:T.white,letterSpacing:"0.06em"}}>
            Stego<span style={{color:T.green}}>frame</span>
          </div>
          <div style={{fontSize:8,color:T.muted,letterSpacing:"0.35em",marginTop:6}}>STEGANOGRAPHIC TRANSPORT</div>
        </div>

        <div style={{background:T.surf,border:`1px solid ${T.b0}`,borderRadius:4,overflow:"hidden"}}>
          <div style={{padding:"11px 16px",borderBottom:`1px solid ${T.b0}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:9,letterSpacing:"0.3em",color:T.sub,textTransform:"uppercase"}}>
              {isJoining?"join room":"create room"}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {/* Show countdown on join screen if we already know the expiry */}
              {isJoining&&roomExpiry&&<CountdownBadge expiresAt={roomExpiry}/>}
              <div style={{fontSize:8,color:T.dim,letterSpacing:"0.15em",fontFamily:MONO}}>#{roomId}</div>
            </div>
          </div>

          <div style={{padding:20,display:"flex",flexDirection:"column",gap:16}}>

            {isJoining&&(
              <div style={{background:T.gd,border:`1px solid ${T.green}`,borderRadius:2,padding:"8px 12px",fontSize:9,color:T.green,lineHeight:1.7,letterSpacing:"0.05em"}}>
                You've been invited to room <strong>#{roomId}</strong> in {mode.toUpperCase()} mode.
                Enter the shared passphrase to join.
              </div>
            )}

            {/* Display name */}
            <div>
              <div style={{fontSize:8,color:T.muted,letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:6}}>display name</div>
              <input value={uname} onChange={e=>setUname(e.target.value.slice(0,24))} maxLength={24}
                placeholder="your handle (optional)"
                style={{width:"100%",background:T.raised,border:`1px solid ${T.b1}`,color:T.bright,padding:"9px 12px",fontSize:13,outline:"none",borderRadius:3}}
              />
              <div style={{fontSize:8,color:T.dim,marginTop:4,lineHeight:1.5}}>
                Shown beside your messages. Saved locally. Max 24 chars.
              </div>
            </div>

            {/* Passphrase */}
            <div>
              <div style={{fontSize:8,color:T.muted,letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:6}}>passphrase</div>
              <div style={{position:"relative"}}>
                <input type={show?"text":"password"} value={pass}
                  onChange={e=>{setPass(e.target.value);setErr("");}}
                  onKeyDown={e=>{if(e.key==="Enter")join();}}
                  placeholder={isJoining?"enter shared passphrase…":"choose a shared secret…"} autoFocus
                  style={{width:"100%",background:T.raised,border:`1px solid ${err?T.red:T.b1}`,color:T.bright,padding:"9px 44px 9px 12px",fontSize:13,outline:"none",borderRadius:3}}
                />
                <button onClick={()=>setShow(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.dim,cursor:"pointer",fontSize:9,letterSpacing:"0.1em"}}>
                  {show?"hide":"show"}
                </button>
              </div>
              {err&&<div style={{fontSize:9,color:T.red,marginTop:5}}>{err}</div>}
            </div>

            {/* Encoding mode — create only (joiner's mode comes from URL) */}
            {!isJoining&&(
              <div>
                <div style={{fontSize:8,color:T.muted,letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:6}}>encoding mode</div>
                <div style={{display:"flex",gap:6}}>
                  {[Enc.SVG,Enc.LSB].map(m=>(
                    <button key={m} onClick={()=>setMode(m)} style={{
                      flex:1,padding:"9px 0",
                      background:mode===m?T.gd:"transparent",
                      border:`1px solid ${mode===m?T.green:T.b1}`,
                      color:mode===m?T.green:T.muted,
                      fontSize:9,letterSpacing:"0.2em",cursor:"pointer",borderRadius:3,textTransform:"uppercase",
                    }}>
                      <div>{m}</div>
                      <div style={{fontSize:7,color:mode===m?T.green:T.dim,marginTop:3}}>
                        {m===Enc.SVG?"vector · xml":"raster · lsb"}
                      </div>
                    </button>
                  ))}
                </div>
                <div style={{fontSize:8,color:T.dim,marginTop:6,lineHeight:1.7}}>
                  {mode===Enc.SVG?"Carriers look like abstract art.":"Carriers look like pixel noise."}
                  {" "}Both parties must use the same mode. Mode is shared via URL.
                </div>
              </div>
            )}

            {/* TTL note — create only */}
            {!isJoining&&(
              <div style={{fontSize:8,color:T.dim,lineHeight:1.7,background:T.raised,border:`1px solid ${T.b0}`,borderRadius:2,padding:"8px 10px"}}>
                ⏱ Rooms expire after <strong style={{color:T.txt}}>7 days</strong> and are permanently deleted.
                A live countdown is shown in the room header.
              </div>
            )}

            <button onClick={join} disabled={loading} style={{
              width:"100%",padding:"11px",
              background:loading?T.surf:T.gd,border:`1px solid ${loading?T.b1:T.green}`,color:loading?T.dim:T.green,
              fontSize:10,letterSpacing:"0.25em",cursor:loading?"not-allowed":"pointer",borderRadius:3,textTransform:"uppercase",
            }}>
              {loading?"opening room…":(isJoining?"join room →":"create + open room →")}
            </button>

            <div style={{fontSize:8,color:T.dim,lineHeight:1.9,letterSpacing:"0.04em",borderTop:`1px solid ${T.b0}`,paddingTop:12}}>
              The passphrase never leaves your device. Supabase only stores encrypted carrier images —
              without the passphrase they are indistinguishable from noise.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// COMPONENT: App (root)
// ──────────────────────────────────────────────────────────────────────────────
// Two states: null = Setup screen, object = active ChatView.
// Session holds { roomId, mode, passphrase, expiresAt }.
// Passphrase lives in memory only — never persisted anywhere.
// ══════════════════════════════════════════════════════════════════════════════

function App(){
  const [session,setSession]=useState(null);
  const join  = s  => setSession(s);
  const leave = () => { clearUrlParams(); setSession(null); };
  if(!session) return <Setup onJoin={join}/>;
  return <ChatView {...session} onLeave={leave}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
